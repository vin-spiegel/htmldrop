name: Publish to MCP Registry

# Publishes server.json (the hosted Streamable HTTP server) to the official MCP
# Registry. GitHub OIDC proves ownership of the io.github.vin-spiegel namespace,
# so no secrets are needed. Runs on version tags, or on demand.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC authentication to the registry
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
